name: business_card_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - image/

  fonts:
    - family: BodoniModa
      fonts:
        - asset: Fonts/BodoniModa-Italic-VariableFont_opsz,wght.ttf

    - family: Playwrite
      fonts:
        - asset: Fonts/PlaywriteIE-VariableFont_wght.ttf

    - family: LibreBaskerville
      fonts:
        - asset: Fonts/LibreBaskerville-VariableFont_wght.ttf